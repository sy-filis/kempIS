# This workflow builds, lints, tests, and publishes the .NET project.
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-2025-vs2026

    defaults:
      run:
        working-directory: KempIS Backend

    steps:
    - name: Configure git
      working-directory: .
      run: |-
        git config --global core.autocrlf false
        git config --global core.eol lf

    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
        cache: true
        cache-dependency-path: KempIS Backend/Directory.Packages.props

    - name: Restore dependencies
      run: dotnet restore

    - name: Lint (dotnet format)
      run: dotnet format --no-restore --verify-no-changes --verbosity diagnostic

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal
