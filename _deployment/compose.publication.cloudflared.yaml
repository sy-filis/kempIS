services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: kempis-cloudflared
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${TUNNEL_TOKEN}"]
    environment:
      TUNNEL_METRICS: "0.0.0.0:2000"
    depends_on:
      caddy-wan:
        condition: service_started
    networks:
      - kempis
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
