<p-toast />
<p-confirmDialog />

<div class="kemp-is-spots">
  <header class="kemp-is-spots__toolbar">
    <p-select
      [options]="groupFilterOptions()"
      optionLabel="name"
      optionValue="id"
      [ngModel]="groupFilter()"
      (ngModelChange)="groupFilter.set($event)"
      placeholder="Filtr podle skupiny"
      [filter]="true"
      appendTo="body"
      styleClass="kemp-is-spots__filter"
    />
    <p-button
      label="Přidat místo"
      icon="pi pi-plus"
      (onClick)="onCreate()"
    />
  </header>

  <p-table
    [value]="rows()"
    [loading]="loading()"
    dataKey="id"
    [customSort]="true"
    (sortFunction)="onSort($event)"
    [scrollable]="true"
    scrollHeight="flex"
    styleClass="kemp-is-table kemp-is-table-scrollable"
    [tableStyle]="{ 'min-width': '50rem' }"
  >
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="groupName">
          Skupina <p-sortIcon field="groupName" />
        </th>
        <th pSortableColumn="name">Název <p-sortIcon field="name" /></th>
        <th
          pSortableColumn="isActive"
          style="width: 8rem"
        >
          Stav <p-sortIcon field="isActive" />
        </th>
        <th
          style="width: 8rem"
          class="kemp-is-spots__actions-col"
        >
          Akce
        </th>
      </tr>
    </ng-template>

    <ng-template
      pTemplate="body"
      let-s
    >
      <tr>
        <td>{{ s.groupName }}</td>
        <td>{{ s.name }}</td>
        <td>
          @if (s.isActive) {
            <p-tag
              value="Aktivní"
              severity="success"
            />
          } @else {
            <p-tag
              value="Neaktivní"
              severity="secondary"
            />
          }
        </td>
        <td class="kemp-is-spots__actions-cell">
          <p-button
            icon="pi pi-pencil"
            severity="secondary"
            [text]="true"
            [rounded]="true"
            size="small"
            ariaLabel="Upravit"
            (onClick)="onEdit(s)"
          />
          <p-button
            icon="pi pi-trash"
            severity="danger"
            [text]="true"
            [rounded]="true"
            size="small"
            ariaLabel="Smazat"
            (onClick)="onDelete(s)"
          />
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td
          colspan="4"
          class="kemp-is-spots__empty"
        >
          Žádné záznamy. Začněte tlačítkem Přidat.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<kemp-is-spot-form-dialog
  [(visible)]="formVisible"
  [spot]="editingSpot()"
  [defaultSpotGroupId]="defaultGroupForCreate()"
  (saved)="onFormSaved($event)"
/>
