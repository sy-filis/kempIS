<p-toast />
<p-confirmDialog />

<div class="kemp-is-languages">
  <header class="kemp-is-languages__toolbar">
    <p-button
      label="Přidat jazyk"
      icon="pi pi-plus"
      (onClick)="onCreate()"
    />
  </header>

  <p-table
    [value]="rows()"
    [loading]="loading()"
    dataKey="id"
    [scrollable]="true"
    scrollHeight="flex"
    styleClass="kemp-is-table kemp-is-table-scrollable"
    [tableStyle]="{ 'min-width': '40rem' }"
  >
    <ng-template pTemplate="header">
      <tr>
        <th
          pSortableColumn="code"
          style="width: 8rem"
        >
          Kód <p-sortIcon field="code" />
        </th>
        <th pSortableColumn="name">Název <p-sortIcon field="name" /></th>
        <th
          style="width: 8rem"
          class="kemp-is-languages__actions-col"
        >
          Akce
        </th>
      </tr>
    </ng-template>

    <ng-template
      pTemplate="body"
      let-language
    >
      <tr>
        <td class="kemp-is-languages__code">{{ language.code }}</td>
        <td>{{ language.name }}</td>
        <td class="kemp-is-languages__actions-cell">
          <p-button
            icon="pi pi-pencil"
            severity="secondary"
            [text]="true"
            [rounded]="true"
            size="small"
            ariaLabel="Upravit"
            (onClick)="onEdit(language)"
          />
          <p-button
            icon="pi pi-trash"
            severity="danger"
            [text]="true"
            [rounded]="true"
            size="small"
            ariaLabel="Smazat"
            (onClick)="onDelete(language)"
          />
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td
          colspan="3"
          class="kemp-is-languages__empty"
        >
          Žádné záznamy. Začněte tlačítkem Přidat.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<kemp-is-language-form-dialog
  [(visible)]="formVisible"
  [language]="editingLanguage()"
  (saved)="onFormSaved($event)"
/>
