<p-toast />
<p-confirmDialog />

<div class="kemp-is-spot-groups">
  <header class="kemp-is-spot-groups__toolbar">
    <p-button
      label="Přidat skupinu"
      icon="pi pi-plus"
      (onClick)="onCreate()"
    />
  </header>

  <p-table
    [value]="rows()"
    [loading]="loading()"
    dataKey="id"
    [scrollable]="true"
    scrollHeight="flex"
    styleClass="kemp-is-table kemp-is-table-scrollable"
    [tableStyle]="{ 'min-width': '50rem' }"
  >
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="serviceName">
          Služba <p-sortIcon field="serviceName" />
        </th>
        <th pSortableColumn="name">Název <p-sortIcon field="name" /></th>
        <th
          pSortableColumn="capacity"
          style="width: 8rem"
        >
          Kapacita <p-sortIcon field="capacity" />
        </th>
        <th
          pSortableColumn="isActive"
          style="width: 8rem"
        >
          Stav <p-sortIcon field="isActive" />
        </th>
        <th
          style="width: 8rem"
          class="kemp-is-spot-groups__actions-col"
        >
          Akce
        </th>
      </tr>
    </ng-template>

    <ng-template
      pTemplate="body"
      let-sg
    >
      <tr>
        <td>{{ sg.serviceName }}</td>
        <td>{{ sg.name }}</td>
        <td>{{ sg.capacity }}</td>
        <td>
          @if (sg.isActive) {
            <p-tag
              value="Aktivní"
              severity="success"
            />
          } @else {
            <p-tag
              value="Neaktivní"
              severity="secondary"
            />
          }
        </td>
        <td class="kemp-is-spot-groups__actions-cell">
          <p-button
            icon="pi pi-pencil"
            severity="secondary"
            [text]="true"
            [rounded]="true"
            size="small"
            ariaLabel="Upravit"
            (onClick)="onEdit(sg)"
          />
          <p-button
            icon="pi pi-trash"
            severity="danger"
            [text]="true"
            [rounded]="true"
            size="small"
            ariaLabel="Smazat"
            (onClick)="onDelete(sg)"
          />
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td
          colspan="5"
          class="kemp-is-spot-groups__empty"
        >
          Žádné záznamy. Začněte tlačítkem Přidat.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<kemp-is-spot-group-form-dialog
  [(visible)]="formVisible"
  [spotGroup]="editingSpotGroup()"
  (saved)="onFormSaved($event)"
/>
