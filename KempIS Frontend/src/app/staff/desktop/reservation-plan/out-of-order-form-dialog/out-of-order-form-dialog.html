<p-dialog
  [visible]="visible()"
  (visibleChange)="onVisibleChange($event)"
  [header]="
    mode() === 'edit' ? 'Upravit záznam mimo provoz' : 'Nový záznam mimo provoz'
  "
  [modal]="true"
  [dismissableMask]="!submitting()"
  [closeOnEscape]="!submitting()"
  [draggable]="false"
  [resizable]="false"
  [closable]="!submitting()"
  [style]="{ width: '40rem' }"
  styleClass="kemp-is-out-of-order-dialog"
  appendTo="body"
>
  <form
    class="kemp-is-out-of-order-dialog__form"
    (ngSubmit)="onSubmit()"
  >
    <div class="kemp-is-out-of-order-dialog__row-pair">
      <div class="kemp-is-out-of-order-dialog__row">
        <label for="ooo-from">Od *</label>
        <p-datePicker
          inputId="ooo-from"
          name="ooo-from"
          dateFormat="d. m. yy"
          appendTo="body"
          [maxDate]="toDate() ?? undefined"
          [ngModel]="fromDate()"
          (ngModelChange)="fromDate.set($event)"
        />
      </div>
      <div class="kemp-is-out-of-order-dialog__row">
        <label for="ooo-to">Do *</label>
        <p-datePicker
          inputId="ooo-to"
          name="ooo-to"
          dateFormat="d. m. yy"
          appendTo="body"
          [minDate]="fromDate() ?? undefined"
          [ngModel]="toDate()"
          (ngModelChange)="toDate.set($event)"
        />
      </div>
    </div>

    <div class="kemp-is-out-of-order-dialog__row">
      <label for="ooo-spots">Chaty / Skupiny *</label>
      <p-treeSelect
        inputId="ooo-spots"
        selectionMode="checkbox"
        display="chip"
        placeholder="Vyberte chaty nebo skupiny"
        [filter]="true"
        filterBy="label"
        appendTo="body"
        [options]="treeNodes()"
        [ngModel]="treeSelection()"
        (ngModelChange)="treeSelection.set($event)"
        name="ooo-spots"
      >
        <ng-template
          pTemplate="value"
          let-placeholder="placeholder"
        >
          @if (selectedSpotChips().length === 0) {
            <span>{{ placeholder }}</span>
          } @else {
            @for (chip of selectedSpotChips(); track chip.key) {
              <p-chip [label]="chip.label" />
            }
          }
        </ng-template>
      </p-treeSelect>
    </div>

    <div class="kemp-is-out-of-order-dialog__row">
      <label for="ooo-reason">Důvod *</label>
      <textarea
        pTextarea
        id="ooo-reason"
        name="ooo-reason"
        rows="2"
        maxlength="500"
        [ngModel]="reason()"
        (ngModelChange)="reason.set($event)"
      ></textarea>
    </div>

    @if (errorMessage(); as err) {
      <p-message severity="error">{{ err }}</p-message>
    }
  </form>

  <ng-template #footer>
    <div class="kemp-is-out-of-order-dialog__footer">
      @if (canDelete()) {
        <p-button
          label="Smazat"
          severity="danger"
          [outlined]="true"
          [disabled]="submitting()"
          (onClick)="onDelete()"
        />
      }
      <span class="kemp-is-out-of-order-dialog__footer-spacer"></span>
      <p-button
        label="Zavřít"
        severity="secondary"
        [outlined]="true"
        [disabled]="submitting()"
        (onClick)="onCancel()"
      />
      <p-button
        [label]="mode() === 'edit' ? 'Uložit' : 'Vytvořit'"
        [disabled]="!canSubmit()"
        [loading]="submitting()"
        (onClick)="onSubmit()"
      />
    </div>
  </ng-template>
</p-dialog>

<p-confirmDialog
  [closable]="false"
  [closeOnEscape]="true"
  appendTo="body"
/>
